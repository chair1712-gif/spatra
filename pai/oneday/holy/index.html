    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --accent: #10b981;
            --bg: #f3f4f6;
            --surface: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --radius: 12px;
            --arabic-font-size: 28px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0; margin-bottom: 20px; font-size: 1.25rem; text-align: center; color: var(--primary-dark);
        }

        .form-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: var(--text-main); }

        select, .btn {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem;
            background-color: #fff;
        }
        select { appearance: none; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%231f2937%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 12px top 50%; background-size: 12px auto; }

        .parts-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            padding-bottom: 20px;
        }

        .part-btn {
            background: #fff;
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4px 2px;
            min-height: 55px;
            position: relative;
        }

        .part-btn:active { transform: scale(0.95); }

        .part-num {
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 2px;
        }

        .part-detail {
            font-size: 0.6rem; 
            color: #666;
            text-align: center;
            line-height: 1.1;
            width: 100%;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .part-btn.selected {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 2px 4px rgba(16, 185, 129, 0.4);
        }
        .part-btn.selected .part-detail { color: rgba(255,255,255,0.9); }

        .part-btn::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background-color: #1f2937;
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 100;
        }
        .part-btn:hover::after {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(-5px);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-database {
            background: #1e3a8a;
            color: white;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-database:active { transform: scale(0.98); }

        .result-card {
            margin-top: 24px; background: var(--primary-dark); color: white; padding: 20px;
            border-radius: var(--radius); box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }
        .result-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; margin-bottom: 8px; display: block; }
        .result-value { font-size: 1rem; font-weight: 500; line-height: 1.5; word-break: break-word; margin-bottom: 10px;}

        .result-details {
            font-size: 0.9rem; color: #fff; background: rgba(255,255,255,0.1); padding: 15px;
            border-radius: 8px; margin-top: 10px; line-height: 1.6; max-height: 500px; overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.3) transparent;
        }

        .quran-block { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed rgba(255,255,255,0.3); }
        .surah-header {
            font-family: 'Amiri', serif; font-size: 1.3rem; color: #fbbf24;
            margin-bottom: 12px; padding-bottom: 5px; border-bottom: 2px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column; text-align: center;
        }
        .surah-header .latin-name { font-family: sans-serif; font-size: 0.9rem; color: #e5e7eb; margin-top: 4px; }
        .arabic-text {
            font-family: 'Amiri', serif; font-size: var(--arabic-font-size); line-height: 2.4; text-align: right;
            direction: rtl; margin-bottom: 12px; color: #ffffff; font-weight: 400;
        }
        .translation-text { font-size: 14px; color: #dbeafe; font-style: italic; text-align: left; line-height: 1.6; }

        .loading-spinner { text-align: center; padding: 20px; font-style: italic; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        .placeholder-text { font-style: italic; opacity: 0.7; }
        .required { color: #ef4444; }
        .font-control { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .font-control input { flex: 1; }
        .error-message { color: #ef4444; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>

    <div class="container">
        <h2>OneDay OneJuz </h2>

        <!-- Dropdown Kelas dan Nama -->
        <div class="form-group">
            <label for="kelasSiswa">Kelas <span class="required">*</span></label>
            <select id="kelasSiswa" onchange="updateNamaSiswa()">
                <option value="">-- Pilih Kelas --</option>
            </select>
        </div>
        <div class="form-group">
            <label for="namaSiswa">Nama Siswa <span class="required">*</span></label>
            <select id="namaSiswa" onchange="updateResult()">
                <option value="">-- Pilih Nama --</option>
            </select>
        </div>

        <!-- Pilih Juz -->
        <div class="form-group">
            <label for="juzInput">Nomor Juz <span class="required">*</span></label>
            <select id="juzInput" onchange="handleJuzChange()">
                <option value="" disabled selected>-- Pilih Juz --</option>
            </select>
        </div>

        <!-- Grid Bagian (bebas pilih) -->
        <div class="form-group">
            <label>Bagian Bacaan (klik untuk memilih, boleh lebih dari satu)</label>
            <div class="parts-grid" id="partsGrid"></div>
            <div id="errorMessage" class="error-message"></div>
        </div>

        <!-- Tombol Tampilkan Ayat -->
        <button class="btn btn-primary" id="btnTampilkanAyat" onclick="tampilkanAyat()" disabled>
            <i class="fas fa-book-open"></i> Tampilkan Ayat
        </button>

        <!-- Card Info & Ayat -->
        <div class="result-card">
            <span class="result-label">Informasi Terpilih</span>
            <div id="resultOutput" class="result-value">
                <span class="placeholder-text">Silakan lengkapi data...</span>
            </div>

            <!-- Kontrol Ukuran Font Arab -->
            <div class="font-control">
                <span style="color: white; font-size: 0.8rem;">🔤 Ukuran Arab</span>
                <input type="range" id="fontSizeControl" min="20" max="60" value="28" step="1" oninput="updateFontSize(this.value)">
                <span id="fontSizeLabel" style="color: white; font-size: 0.8rem;">28px</span>
            </div>

            <!-- Tempat Ayat akan ditampilkan -->
            <div id="resultDetails" class="result-details" style="display: none;"></div>
        </div>

        <!-- Tombol Simpan ke Database -->
        <button class="btn btn-database" id="btnSimpanDatabase" onclick="simpanKeDatabase()">
            <i class="fas fa-database"></i> SIMPAN KE DATABASE
        </button>
    </div>

        function parseSiswaData() {
            const kelasSelect = document.getElementById('kelasSiswa');
            const kelasBlocks = rawSiswaData.trim().split('#').filter(block => block.length > 0);
            kelasBlocks.forEach(block => {
                const parts = block.split('|');
                if (parts.length > 0) {
                    const kelas = parts[0].trim();
                    const opt = document.createElement('option');
                    opt.value = kelas;
                    opt.text = kelas;
                    kelasSelect.appendChild(opt);
                }
            });
        }

        function updateNamaSiswa() {
            const kelas = document.getElementById('kelasSiswa').value;
            const namaSelect = document.getElementById('namaSiswa');
            namaSelect.innerHTML = '<option value="">-- Pilih Nama --</option>';
            if (!kelas) return;

            const kelasBlocks = rawSiswaData.trim().split('#').filter(block => block.length > 0);
            for (let block of kelasBlocks) {
                const parts = block.split('|');
                if (parts[0].trim() === kelas) {
                    parts.slice(1).forEach(name => {
                        const opt = document.createElement('option');
                        opt.value = name.trim();
                        opt.text = name.trim();
                        namaSelect.appendChild(opt);
                    });
                    break;
                }
            }
            updateResult();
        }

        function parseJuzData() {
            const juzBlocks = rawData.split("**").filter(block => block.trim() !== "");
            juzBlocks.forEach(block => {
                const parts = block.split("#");
                if (parts.length >= 2) {
                    const label = parts[0].trim();
                    const content = parts[1].trim();
                    const segments = content.split("|").map(s => s.trim());
                    parsedJuzData[label] = segments;
                }
            });
        }

        function populateJuzOptions() {
            Object.keys(parsedJuzData).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = key;
                juzSelect.appendChild(opt);
            });
        }

        function createPartButtons() {
            for (let i = 1; i <= 20; i++) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'part-btn';
                btn.dataset.value = i;
                btn.innerHTML = `<span class="part-num">${i}</span><span class="part-detail" id="detail-${i}">...</span>`;
                btn.onclick = function() { togglePart(i, this); };
                partsGrid.appendChild(btn);
            }
        }

        // ================== HANDLE JUZ CHANGE ==================
        function handleJuzChange() {
            const juzVal = juzSelect.value;
            if (!juzVal) return;
            const segments = parsedJuzData[juzVal] || [];
            for (let i = 1; i <= 20; i++) {
                const detailEl = document.getElementById(`detail-${i}`);
                const btn = partsGrid.children[i-1];
                if (segments[i-1]) {
                    const text = segments[i-1];
                    detailEl.textContent = text;
                    btn.setAttribute('data-tooltip', text);
                } else {
                    detailEl.textContent = "-";
                    btn.setAttribute('data-tooltip', "Tidak ada data");
                }
            }
            // Reset pilihan
            selectedParts.clear();
            document.querySelectorAll('.part-btn').forEach(btn => btn.classList.remove('selected'));
            updateTampilkanButton();
            document.getElementById('errorMessage').textContent = '';
            updateResult();
        }

        // ================== TOGGLE PILIHAN (bebas) ==================
        function togglePart(val, element) {
            if (selectedParts.has(val)) {
                selectedParts.delete(val);
                element.classList.remove('selected');
            } else {
                selectedParts.add(val);
                element.classList.add('selected');
            }
            updateTampilkanButton();
            updateResult();
        }

        function updateTampilkanButton() {
            const btn = document.getElementById('btnTampilkanAyat');
            btn.disabled = selectedParts.size === 0;
        }

        // ================== UPDATE RINGKASAN ==================
        function updateResult() {
            const kelas = document.getElementById('kelasSiswa').value || '-';
            const nama = document.getElementById('namaSiswa').value || '-';
            const juzVal = document.getElementById('juzInput').value || '-';
            const outputDiv = document.getElementById('resultOutput');
            const detailsDiv = document.getElementById('resultDetails');

            if (!kelas || !nama || !juzVal || selectedParts.size === 0) {
                outputDiv.innerHTML = '<span class="placeholder-text">Data belum lengkap...</span>';
                detailsDiv.style.display = 'none';
                return;
            }

            const juzNum = juzVal.replace("JUZ ", "");
            const sortedParts = Array.from(selectedParts).sort((a, b) => a - b);
            const partsString = sortedParts.join(',');

            outputDiv.textContent = `${kelas} | ${nama} | Juz ${juzNum} | Bagian ${partsString}`;
        }

        // ================== FUNGSI TAMPILKAN AYAT ==================
        async function fetchAyatFromCloud(surahName, startAyah, endAyah) {
            const normalized = normalizeSurahName(surahName);
            const surahNumber = SURAH_MAP[normalized];
            if (!surahNumber) {
                return `<div class="quran-block">Surah "${surahName}" tidak ditemukan dalam mapping.</div>`;
            }

            try {
                const url = `https://api.alquran.cloud/v1/surah/${surahNumber}/editions/quran-uthmani,id.indonesian`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                if (!data.data || data.data.length < 2) {
                    return `<div class="quran-block">Gagal mendapatkan data ayat.</div>`;
                }

                const arabEdition = data.data.find(ed => ed.edition.identifier === 'quran-uthmani');
                const transEdition = data.data.find(ed => ed.edition.identifier === 'id.indonesian');

                if (!arabEdition || !arabEdition.ayahs || !transEdition || !transEdition.ayahs) {
                    return `<div class="quran-block">Data ayat tidak lengkap.</div>`;
                }

                const arabAyahs = arabEdition.ayahs;
                const transAyahs = transEdition.ayahs;

                const filtered = arabAyahs.filter(ayah => ayah.numberInSurah >= startAyah && ayah.numberInSurah <= endAyah);
                if (filtered.length === 0) {
                    return `<div class="quran-block">Tidak ada ayat dalam rentang ${startAyah}-${endAyah}.</div>`;
                }

                // Untuk header, kita butuh nama Arab. Gunakan mapping sederhana atau ambil dari API? Kita pakai nama Latin saja.
                let html = `
                    <div class="surah-header">
                        <span class="latin-name">${surahName} (Ayat ${startAyah} - ${endAyah})</span>
                    </div>
                `;

                filtered.forEach(arabAyah => {
                    const ayahNum = arabAyah.numberInSurah;
                    const transAyah = transAyahs.find(t => t.numberInSurah === ayahNum);
                    const translationText = transAyah ? transAyah.text : 'Terjemahan tidak tersedia';
                    html += `
                        <div class="quran-block">
                            <div class="arabic-text">${arabAyah.text} <span style="font-size:0.6em; vertical-align:super; color:#aaa;">${ayahNum}</span></div>
                            <div class="translation-text">${translationText}</div>
                        </div>
                    `;
                });

                return html;
            } catch (error) {
                console.error(error);
                return `<div class="quran-block" style="color:#ffadad">Gagal mengambil data: ${error.message}. Periksa koneksi.</div>`;
            }
        }

        function parseTooltip(text) {
            // Format: "NamaSurah Awal-Akhir" atau "NamaSurah Awal" (jika hanya satu ayat)
            const match = text.match(/^(.+?)\s+(\d+)(?:-(\d+))?$/);
            if (match) {
                let surah = match[1].trim();
                let start = parseInt(match[2]);
                let end = match[3] ? parseInt(match[3]) : start;
                return { surah, start, end };
            }
            return null;
        }

        async function tampilkanAyat() {
            if (selectedParts.size === 0) return;

            const sorted = Array.from(selectedParts).sort((a,b)=>a-b);
            const firstIdx = sorted[0];
            const lastIdx = sorted[sorted.length-1];
            const firstTooltip = document.getElementById(`detail-${firstIdx}`).textContent;
            const lastTooltip = document.getElementById(`detail-${lastIdx}`).textContent;

            const firstParsed = parseTooltip(firstTooltip);
            const lastParsed = parseTooltip(lastTooltip);

            if (!firstParsed || !lastParsed) {
                alert('Format tooltip tidak dikenali. Mungkin mengandung dua surah?');
                return;
            }

            if (firstParsed.surah !== lastParsed.surah) {
                alert('Bagian yang dipilih harus dalam satu surah yang sama.');
                return;
            }

            const surahName = firstParsed.surah;
            const startAyah = firstParsed.start;
            const endAyah = lastParsed.end;

            const detailsDiv = document.getElementById('resultDetails');
            detailsDiv.style.display = 'block';
            detailsDiv.innerHTML = '<div class="loading-spinner">Sedang mengambil teks Al-Qur\'an...</div>';

            const html = await fetchAyatFromCloud(surahName, startAyah, endAyah);
            detailsDiv.innerHTML = html;
        }

        // ================== SIMPAN KE DATABASE ==================
        async function simpanKeDatabase() {
            const kelas = document.getElementById('kelasSiswa').value;
            const nama = document.getElementById('namaSiswa').value;
            const juzVal = document.getElementById('juzInput').value;

            if (!kelas || !nama || !juzVal || selectedParts.size === 0) {
                alert("Harap lengkapi Kelas, Nama, Juz, dan pilih minimal satu bagian bacaan.");
                return;
            }

            // Dapatkan rentang ayat dari bagian pertama dan terakhir
            const sortedParts = Array.from(selectedParts).sort((a,b)=>a-b);
            const firstIdx = sortedParts[0];
            const lastIdx = sortedParts[sortedParts.length-1];
            const firstTooltip = document.getElementById(`detail-${firstIdx}`).textContent;
            const lastTooltip = document.getElementById(`detail-${lastIdx}`).textContent;

            const firstParsed = parseTooltip(firstTooltip);
            const lastParsed = parseTooltip(lastTooltip);

            if (!firstParsed || !lastParsed) {
                alert("Tidak dapat membaca format bagian bacaan.");
                return;
            }

            if (firstParsed.surah !== lastParsed.surah) {
                alert("Bagian yang dipilih harus berasal dari surah yang sama.");
                return;
            }

            const surahName = firstParsed.surah;
            const startAyah = firstParsed.start;
            const endAyah = lastParsed.end;
 const bacaQuran = `Juz: ${startAyah}-${endAyah} (${surahName})`;

            const payload = {
                kelas: kelas,
                nama: nama,
                shalatFardhu: "-",
                shalatSunah: "-",
                bacaQuran: bacaQuran,
                hafalan: "-",
                kajian: "-"
            };

            const btn = document.getElementById('btnSimpanDatabase');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';
            btn.disabled = true;

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.result === 'success') {
                    alert("Terima kasih, data telah disimpan.");
                    resetForm();
                } else {
                    alert("Gagal menyimpan: " + (result.message || 'Unknown error'));
                }
            } catch (error) {
                console.error(error);
                alert("Terjadi kesalahan koneksi ke database.");
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }

        // Reset form setelah simpan
        function resetForm() {
            document.getElementById('kelasSiswa').value = '';
            document.getElementById('namaSiswa').innerHTML = '<option value="">-- Pilih Nama --</option>';
            document.getElementById('juzInput').value = '';
            selectedParts.clear();
            document.querySelectorAll('.part-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('resultOutput').innerHTML = '<span class="placeholder-text">Silakan lengkapi data...</span>';
            document.getElementById('resultDetails').style.display = 'none';
            document.getElementById('btnTampilkanAyat').disabled = true;
        }

        // Kontrol ukuran font
        function updateFontSize(val) {
            document.documentElement.style.setProperty('--arabic-font-size', val + 'px');
            document.getElementById('fontSizeLabel').textContent = val + 'px';
        }

        window.onload = init;
    </script>
</body>
